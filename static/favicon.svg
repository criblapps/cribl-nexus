<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48">
  <defs>
    <radialGradient id="cg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c084ff"/>
      <stop offset="100%" stop-color="#7e14ff"/>
    </radialGradient>
    <radialGradient id="ng" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#47bfff"/>
      <stop offset="100%" stop-color="#863bff"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Spoke lines from center to outer nodes -->
  <line x1="24" y1="24" x2="24" y2="5"   stroke="#863bff" stroke-width="1.5" stroke-opacity="0.6"/>
  <line x1="24" y1="24" x2="40" y2="14"  stroke="#863bff" stroke-width="1.5" stroke-opacity="0.6"/>
  <line x1="24" y1="24" x2="40" y2="34"  stroke="#863bff" stroke-width="1.5" stroke-opacity="0.6"/>
  <line x1="24" y1="24" x2="24" y2="43"  stroke="#863bff" stroke-width="1.5" stroke-opacity="0.6"/>
  <line x1="24" y1="24" x2="8"  y2="34"  stroke="#863bff" stroke-width="1.5" stroke-opacity="0.6"/>
  <line x1="24" y1="24" x2="8"  y2="14"  stroke="#863bff" stroke-width="1.5" stroke-opacity="0.6"/>

  <!-- Outer ring nodes -->
  <circle cx="24" cy="5"  r="3.5" fill="url(#ng)" filter="url(#glow)"/>
  <circle cx="40" cy="14" r="3.5" fill="url(#ng)" filter="url(#glow)"/>
  <circle cx="40" cy="34" r="3.5" fill="url(#ng)" filter="url(#glow)"/>
  <circle cx="24" cy="43" r="3.5" fill="url(#ng)" filter="url(#glow)"/>
  <circle cx="8"  cy="34" r="3.5" fill="url(#ng)" filter="url(#glow)"/>
  <circle cx="8"  cy="14" r="3.5" fill="url(#ng)" filter="url(#glow)"/>

  <!-- Center node glow halo -->
  <circle cx="24" cy="24" r="10" fill="#7e14ff" fill-opacity="0.25" filter="url(#softglow)"/>
  <!-- Center node -->
  <circle cx="24" cy="24" r="7.5" fill="url(#cg)" filter="url(#glow)"/>
  <!-- Center highlight -->
  <circle cx="24" cy="24" r="3.5" fill="#ede6ff" fill-opacity="0.85"/>
</svg>
